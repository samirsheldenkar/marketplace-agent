version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${MARKETPLACE_DB_USER:-marketplace}
      POSTGRES_PASSWORD: ${MARKETPLACE_DB_PASSWORD:-marketplace}
      POSTGRES_DB: ${MARKETPLACE_DB_NAME:-marketplace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MARKETPLACE_DB_USER:-marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marketplace

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - marketplace

  litellm:
    image: ghcr.io/berriai/litellm:latest
    volumes:
      - ./docker/litellm_config.yaml:/app/config.yaml
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marketplace

  agent-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      MARKETPLACE_DATABASE_URL: postgresql+asyncpg://${MARKETPLACE_DB_USER:-marketplace}:${MARKETPLACE_DB_PASSWORD:-marketplace}@postgres:5432/${MARKETPLACE_DB_NAME:-marketplace}
      MARKETPLACE_LITELLM_URL: http://litellm:4000
      MARKETPLACE_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      MARKETPLACE_API_KEY: ${MARKETPLACE_API_KEY:-dev-api-key}
      MARKETPLACE_APIFY_API_TOKEN: ${MARKETPLACE_APIFY_API_TOKEN}
      MARKETPLACE_IMAGE_STORAGE_PATH: /data/images
    volumes:
      - agent_images:/data/images
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marketplace

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin}
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/backup/workflows
    ports:
      - "5678:5678"
    depends_on:
      agent-service:
        condition: service_healthy
    networks:
      - marketplace

volumes:
  postgres_data:
  ollama_data:
  agent_images:
  n8n_data:

networks:
  marketplace:
    driver: bridge

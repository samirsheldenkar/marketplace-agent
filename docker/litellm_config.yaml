model_list:
  - model_name: vision
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 2048
      temperature: 0.1

  - model_name: reasoning
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 4096
      temperature: 0.1

  - model_name: drafting
    litellm_params:
      model: ollama/llama3
      api_base: http://ollama:11434
      max_tokens: 4096
      temperature: 0.7

router_settings:
  routing_strategy: "usage-based-routing-v2"
  enable_tag_filtering: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
